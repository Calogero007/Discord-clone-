<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Server Cloner</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #161925;
            --text-color: #f0f2f5;
            --accent-color: #5865f2;
            --accent-hover: #4752c4;
            --success-color: #248046;
            --border-color: #2f3136;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-box {
            background-color: rgba(244, 63, 94, 0.1);
            border: 1px solid #f43f5e;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 13px;
            line-height: 1.5;
            color: #fda4af;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #b9bbbe;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: #202225;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--accent-color);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            text-align: center;
            box-sizing: border-box;
        }

        .btn-clone {
            background-color: var(--success-color);
            color: #fff;
        }

        .btn-clone:hover {
            background-color: #1a6535;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .btn:disabled {
            background-color: #4f545c;
            cursor: not-allowed;
        }

        .log-box {
            background-color: #000;
            color: #00ff00;
            font-family: monospace;
            padding: 15px;
            border-radius: 6px;
            height: 160px;
            overflow-y: auto;
            margin-top: 20px;
            font-size: 12px;
            border: 1px solid var(--border-color);
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Server Cloner Pro</h1>

        <div class="status-box">
            <strong>ATTENZIONE:</strong> Questo tool richiede il tuo Token Utente per leggere l'origine e un Bot Token per scrivere sulla destinazione. Non inserire mai i tuoi token su siti non tuoi.
        </div>

        <div class="form-group">
            <label for="user-token">Il tuo Token Utente (Lettura)</label>
            <input type="password" id="user-token" placeholder="Incolla il tuo Token Personale">
        </div>

        <div class="form-group">
            <label for="bot-token">Token del Bot (Scrittura Destinazione)</label>
            <input type="password" id="bot-token" placeholder="Incolla il Token del Bot">
        </div>

        <div class="form-group">
            <label for="id-origine">ID Server Origine</label>
            <input type="text" id="id-origine" placeholder="Inserisci ID Server Origine">
        </div>

        <div class="form-group">
            <label for="id-destinazione">ID Server Destinazione</label>
            <input type="text" id="id-destinazione" placeholder="Inserisci ID Server Destinazione">
        </div>

        <button id="btn-avvia" class="btn btn-clone">AVVIA CLONAZIONE</button>

        <div id="console-log" class="log-box hidden"></div>
    </div>

    <script>
        function scriviLog(messaggio) {
            const logBox = document.getElementById('console-log');
            logBox.classList.remove('hidden');
            logBox.innerHTML += `> ${messaggio}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        document.getElementById('btn-avvia').addEventListener('click', async () => {
            const userToken = document.getElementById('user-token').value.trim();
            const botToken = document.getElementById('bot-token').value.trim();
            const idOrigine = document.getElementById('id-origine').value.trim();
            const idDestinazione = document.getElementById('id-destinazione').value.trim();

            if (!userToken || !botToken || !idOrigine || !idDestinazione) {
                alert("Completa tutti i campi prima di procedere.");
                return;
            }

            const btn = document.getElementById('btn-avvia');
            btn.disabled = true;
            document.getElementById('console-log').innerHTML = "";

            const proxyUrl = "https://cors-anywhere.herokuapp.com/";
            const apiUrl = "https://discord.com/api/v10";

            // Headers distinti per utente (senza prefisso Bot) e bot (con prefisso Bot)
            const headersUtente = { "Authorization": userToken, "Content-Type": "application/json" };
            const headersBot = { "Authorization": `Bot ${botToken}`, "Content-Type": "application/json" };

            try {
                scriviLog("Fase 1: Connessione all'origine tramite Token Utente...");
                
                const resOrigine = await fetch(`${proxyUrl}${apiUrl}/guilds/${idOrigine}/channels`, { headers: headersUtente });
                
                if (!resOrigine.ok) {
                    throw new Error(`Errore Lettura Origine (Status: ${resOrigine.status}). Verifica il tuo Token Utente.`);
                }

                const canali = await resOrigine.json();
                scriviLog(`Successo! Trovati ${canali.length} canali da clonare.`);

                // Divisione e ordinamento
                const categorie = canali.filter(c => c.type === 4).sort((a,b) => a.position - b.position);
                const altriCanali = canali.filter(c => c.type !== 4).sort((a,b) => a.position - b.position);
                const mappaCategorie = {};

                scriviLog("Fase 2: Creazione Categorie sulla destinazione...");
                for (const cat of categorie) {
                    scriviLog(`Clonazione categoria: ${cat.name}`);
                    const resCat = await fetch(`${proxyUrl}${apiUrl}/guilds/${idDestinazione}/channels`, {
                        method: "POST",
                        headers: headersBot,
                        body: JSON.stringify({ name: cat.name, type: 4, position: cat.position })
                    });
                    if (resCat.ok) {
                        const nuovaCat = await resCat.json();
                        mappaCategorie[cat.id] = nuovaCat.id;
                    }
                    await new Promise(r => setTimeout(r, 1000)); // Evita il rate limit
                }

                scriviLog("Fase 3: Creazione Canali di testo e vocali...");
                for (const ch of altriCanali) {
                    scriviLog(`Clonazione canale: #${ch.name}`);
                    const payload = { name: ch.name, type: ch.type, position: ch.position, topic: ch.topic || "" };
                    if (ch.parent_id && mappaCategorie[ch.parent_id]) {
                        payload.parent_id = mappaCategorie[ch.parent_id];
                    }
                    await fetch(`${proxyUrl}${apiUrl}/guilds/${idDestinazione}/channels`, {
                        method: "POST",
                        headers: headersBot,
                        body: JSON.stringify(payload)
                    });
                    await new Promise(r => setTimeout(r, 1000));
                }

                scriviLog("Clonazione completata con successo!");
                alert("Processo terminato!");

            } catch (err) {
                scriviLog(`Errore: ${err.message}`);
                alert(err.message);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
