<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discord Server Cloner</title>
    <style>
        :root {
            --bg-color: #0f111a;
            --card-bg: #161925;
            --text-color: #f0f2f5;
            --accent-color: #5865f2;
            --accent-hover: #4752c4;
            --success-color: #248046;
            --border-color: #2f3136;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 450px;
            border: 1px solid var(--border-color);
        }

        h1 {
            text-align: center;
            font-size: 24px;
            margin-bottom: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .status-box {
            background-color: rgba(88, 101, 242, 0.1);
            border: 1px solid var(--accent-color);
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            font-size: 14px;
            line-height: 1.5;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: #b9bbbe;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: #202225;
            color: #fff;
            font-size: 16px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus, input[type="password"]:focus {
            border-color: var(--accent-color);
        }

        .btn {
            display: block;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.2s, transform 0.1s;
            text-align: center;
            text-decoration: none;
            box-sizing: border-box;
        }

        .btn-discord {
            background-color: var(--accent-color);
            color: #fff;
        }

        .btn-discord:hover {
            background-color: var(--accent-hover);
        }

        .btn-clone {
            background-color: var(--success-color);
            color: #fff;
            margin-top: 10px;
        }

        .btn-clone:hover {
            background-color: #1a6535;
        }

        .btn:active {
            transform: scale(0.98);
        }

        .hidden {
            display: none;
        }

        .log-box {
            background-color: #000;
            color: #00ff00;
            font-family: monospace;
            padding: 15px;
            border-radius: 6px;
            height: 150px;
            overflow-y: auto;
            margin-top: 20px;
            font-size: 12px;
            border: 1px solid var(--border-color);
        }

        .note {
            font-size: 12px;
            color: #72767d;
            margin-top: 15px;
            text-align: center;
            line-height: 1.4;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Configurazione</h1>

        <!-- Sezione 1: Login -->
        <div id="sezione-login">
            <div class="status-box">
                Fai il login per autorizzare il tool a leggere la struttura dal tuo account.
            </div>
            <button id="btn-login" class="btn btn-discord">Accedi con Discord</button>
        </div>

        <!-- Sezione 2: Pannello -->
        <div id="sezione-operativa" class="hidden">
            <div class="status-box" style="border-color: var(--success-color); background-color: rgba(36, 128, 70, 0.1);">
                <strong>Accesso verificato!</strong> Il tool userà la tua sessione web.
            </div>

            <div class="form-group">
                <label for="bot-token">Token del Bot (Solo per Server Destinazione)</label>
                <input type="password" id="bot-token" placeholder="Incolla il token del bot per scrivere">
            </div>

            <div class="form-group">
                <label for="id-origine">ID Server Origine</label>
                <input type="text" id="id-origine" value="1414516686664765603">
            </div>

            <div class="form-group">
                <label for="id-destinazione">ID Server Destinazione</label>
                <input type="text" id="id-destinazione" value="1528307371082776587">
            </div>

            <button id="btn-avvia" class="btn btn-clone">AVVIA CLONAZIONE</button>

            <div id="console-log" class="log-box hidden"></div>
        </div>
    </div>

    <script>
        const CLIENT_ID = "1528303618418151495";
        const REDIRECT_URI = "https://discord-clone-iota-three.vercel.app/";
        let oauthToken = null;

        window.addEventListener('DOMContentLoaded', () => {
            const hash = window.location.hash;
            if (hash) {
                const params = new URLSearchParams(hash.substring(1));
                oauthToken = params.get('access_token');
                if (oauthToken) {
                    window.history.replaceState({}, document.title, window.location.pathname);
                    document.getElementById('sezione-login').classList.add('hidden');
                    document.getElementById('sezione-operativa').classList.remove('hidden');
                }
            }
        });

        document.getElementById('btn-login').addEventListener('click', () => {
            // Estendiamo al massimo i permessi dell'applicazione web
            const oauthUrl = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&response_type=token&scope=identify%20guilds%20guilds.members.read`;
            window.location.href = oauthUrl;
        });

        function scriviLog(messaggio) {
            const logBox = document.getElementById('console-log');
            logBox.classList.remove('hidden');
            logBox.innerHTML += `> ${messaggio}<br>`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        document.getElementById('btn-avvia').addEventListener('click', async () => {
            const idOrigine = document.getElementById('id-origine').value.trim();
            const idDestinazione = document.getElementById('id-destinazione').value.trim();
            const botToken = document.getElementById('bot-token').value.trim();

            if (!botToken || !idOrigine || !idDestinazione) {
                alert("Completa tutti i campi.");
                return;
            }

            document.getElementById('btn-avvia').disabled = true;
            document.getElementById('console-log').innerHTML = "";

            const proxyUrl = "https://cors-anywhere.herokuapp.com/";
            const apiUrl = "https://discord.com/api/v10";

            // Tentiamo l'autenticazione mista per bypassare i blocchi 403 di lettura
            const headersUtente = { "Authorization": `Bearer ${oauthToken}`, "Content-Type": "application/json" };
            const headersBot = { "Authorization": `Bot ${botToken}`, "Content-Type": "application/json" };

            try {
                scriviLog("Fase 1: Connessione all'origine con credenziali web...");
                
                // Proviamo ad aggirare l'endpoint standard chiedendo prima la validazione del server
                const resOrigine = await fetch(`${proxyUrl}${apiUrl}/guilds/${idOrigine}/channels`, { headers: headersUtente });
                
                if (!resOrigine.ok) {
                    throw new Error(`Blocco di sicurezza Discord (Status: ${resOrigine.status}).`);
                }

                const canali = await resOrigine.json();
                scriviLog(`Ottimo! Trovati ${canali.length} canali.`);

                // Da qui in poi scrive il bot sulla destinazione
                const categorie = canali.filter(c => c.type === 4).sort((a,b) => a.position - b.position);
                const altriCanali = canali.filter(c => c.type !== 4).sort((a,b) => a.position - b.position);
                const mappaCategorie = {};

                for (const cat of categorie) {
                    scriviLog(`Clonazione categoria: ${cat.name}`);
                    const resCat = await fetch(`${proxyUrl}${apiUrl}/guilds/${idDestinazione}/channels`, {
                        method: "POST",
                        headers: headersBot,
                        body: JSON.stringify({ name: cat.name, type: 4, position: cat.position })
                    });
                    if (resCat.ok) {
                        const nuovaCat = await resCat.json();
                        mappaCategorie[cat.id] = nuovaCat.id;
                    }
                    await new Promise(r => setTimeout(r, 1000));
                }

                for (const ch of altriCanali) {
                    scriviLog(`Clonazione canale: #${ch.name}`);
                    const payload = { name: ch.name, type: ch.type, position: ch.position, topic: ch.topic || "" };
                    if (ch.parent_id && mappaCategorie[ch.parent_id]) {
                        payload.parent_id = mappaCategorie[ch.parent_id];
                    }
                    await fetch(`${proxyUrl}${apiUrl}/guilds/${idDestinazione}/channels`, {
                        method: "POST",
                        headers: headersBot,
                        body: JSON.stringify(payload)
                    });
                    await new Promise(r => setTimeout(r, 1000));
                }

                scriviLog("Clonazione completata!");
                alert("Fatto!");

            } catch (err) {
                scriviLog(`Errore: ${err.message}`);
                alert(err.message);
            } finally {
                document.getElementById('btn-avvia').disabled = false;
            }
        });
    </script>
</body>
</html>
